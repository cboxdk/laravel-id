name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly, so advisories that land after a release are still surfaced.
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  # Dependency vulnerability scan against the PHP Security Advisories database.
  dependencies:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2
      - run: composer install --no-interaction --no-progress
      - name: composer audit
        run: composer audit --no-dev

  # Secret scanning — a leaked key is the worst failure mode for a security lib.
  # TruffleHog's action is free for organizations (gitleaks-action is not).
  secrets:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # Static application security testing. Findings are uploaded to the Security tab
  # as SARIF rather than failing the build, so triage happens in review.
  sast:
    runs-on: self-hosted
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
      # Semgrep runs via `docker run`, NOT as a job-level `container:`. A container job
      # makes the runner inject an ALPINE node to execute JS actions (checkout,
      # upload-sarif); this runner ships only glibc node24, so every step died on
      # `/__e/node24_alpine/bin/node: no such file` before any scanning happened.
      # Keeping the job on the host lets the JS actions run; semgrep stays pinned to
      # its own image.
      - name: semgrep scan
        run: |
          docker run --rm -u "$(id -u):$(id -g)" -v "$PWD:/src" -w /src \
            semgrep/semgrep semgrep scan \
              --config=p/php --config=p/security-audit --config=p/secrets \
              --sarif --output=semgrep.sarif
        continue-on-error: true
      # Findings are triaged in the Security tab rather than failing the build. Guard
      # on the file existing so a scan that produced nothing cannot fail the upload.
      - name: upload SARIF
        if: hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
