name: ci

on:
  push:
    branches: [main]
    # Release tags too, so the SBOM freshness gate below actually runs where an
    # accurate supply-chain record matters.
    tags: ["v*"]
  pull_request:

jobs:
  quality:
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4", "8.5"]
        # Test both the current and previous Laravel major (12 and 13).
        testbench: ["^10.0", "^11.0"]
    name: PHP ${{ matrix.php }} · testbench ${{ matrix.testbench }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - name: Pin the Laravel major
        run: composer require "orchestra/testbench:${{ matrix.testbench }}" --dev --no-update --no-interaction
      - run: composer update --no-interaction --no-progress --prefer-dist
      - name: Pint (lint)
        run: vendor/bin/pint --test
      # PHPStan runs on the CURRENT Laravel major only (both PHP versions). larastan
      # ships its generic `Eloquent\Scope` stub gated on the Laravel version, so the
      # SAME correct `@implements Scope<Model>` annotation is required on 13 but
      # rejected as "not generic" on 12 — an unresolvable per-major stub discrepancy,
      # not a code bug. Pest still exercises BOTH majors at runtime below.
      - name: PHPStan
        if: matrix.testbench == '^11.0'
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G
      - name: Pest
        run: vendor/bin/pest
      - name: Security audit
        run: composer audit --no-dev
      - name: License compliance
        run: composer license-check
      # The SBOM is derived from composer.lock, which differs per Laravel major, so it
      # is only generated on the canonical cell (latest major).
      - name: SBOM
        if: matrix.php == '8.4' && matrix.testbench == '^11.0'
        run: composer sbom
      # An SBOM documents a RELEASE, so the hard gate lives on tags. This is a library
      # (composer.lock is intentionally not committed), so CI resolves with
      # `composer update` — an exact-match gate on every push therefore fails on any
      # upstream patch release through no fault of the change (guzzle 7.15.0 -> 7.15.1
      # did exactly this). Strict where provenance matters; informational otherwise.
      - name: SBOM is up to date (release tags)
        if: matrix.php == '8.4' && matrix.testbench == '^11.0' && startsWith(github.ref, 'refs/tags/')
        run: |
          git diff --exit-code sbom.json \
            || (echo "::error::sbom.json is stale — run 'composer sbom' and commit before tagging." && exit 1)
      - name: SBOM drift (informational)
        if: matrix.php == '8.4' && matrix.testbench == '^11.0' && !startsWith(github.ref, 'refs/tags/')
        run: |
          git diff --quiet sbom.json \
            || echo "::notice::sbom.json drifted from the current resolve (usually an upstream patch release). Run 'composer sbom' before the next tag."
      - name: Upload SBOM
        if: matrix.php == '8.4' && matrix.testbench == '^11.0'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.json
